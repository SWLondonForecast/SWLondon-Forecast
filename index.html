<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SWLondon Forecast</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0b1626, #1a2a4a);
      color: #e0f0ff;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .container { max-width: 1280px; margin: 0 auto; padding: 20px; }

    /* Enhanced Liquid Glass */
    .glass {
      background: rgba(20, 35, 70, 0.45);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(100, 180, 255, 0.25);
      border-radius: 28px;
      box-shadow: 0 12px 50px rgba(0, 0, 0, 0.5);
      transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
    }

    header { text-align: center; padding: 4rem 0 2rem; }
    h1 { 
      font-size: 3.4rem; 
      background: linear-gradient(90deg, #67e8f9, #bae6fd, #67e8f9);
      background-size: 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: titleGlow 6s ease infinite;
    }
    @keyframes titleGlow { 0%,100% { background-position: 0%; } 50% { background-position: 100%; } }

    /* Status */
    .status-section {
      padding: 18px 28px;
      margin: 1.8rem 0;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* Heat Warning */
    .heat-warning {
      position: fixed;
      top: 25px;
      right: 25px;
      background: rgba(251, 191, 36, 0.95);
      color: #1e2937;
      padding: 16px 22px;
      border-radius: 18px;
      font-weight: 600;
      box-shadow: 0 15px 40px rgba(0,0,0,0.6);
      z-index: 100;
      max-width: 280px;
    }

    /* Tabs with Gloopy Animation */
    .tabs {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 2.5rem 0;
      position: relative;
    }
    .tab-btn {
      padding: 16px 48px;
      font-size: 1.25rem;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(16px);
      color: white;
      border: 1px solid rgba(103, 232, 249, 0.3);
      border-radius: 9999px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      overflow: hidden;
    }
    .tab-btn.active {
      background: rgba(103, 232, 249, 0.25);
      border-color: #67e8f9;
      transform: scale(1.08);
      box-shadow: 0 0 35px rgba(103, 232, 249, 0.6);
    }
    .tab-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.4s;
    }
    .tab-btn:hover::after { opacity: 1; }

    .places-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(390px, 1fr));
      gap: 24px;
      margin-top: 10px;
    }

    .weather-card {
      padding: 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .temp { font-size: 4.8rem; font-weight: 700; line-height: 1; }
    .location { font-size: 1.4rem; margin-top: 10px; opacity: 0.95; }

    .radar-section { margin: 4rem 0; text-align: center; }
    iframe {
      width: 100%;
      max-width: 1100px;
      height: 560px;
      border: none;
      border-radius: 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }

    .last-updated { text-align: center; margin: 35px 0; opacity: 0.75; }
  </style>
</head>
<body>
  <header>
    <div class="container glass">
      <h1>SWLondon Forecast</h1>
      <p>Somerset & London Weather</p>
    </div>
  </header>

  <main class="container">
    <!-- Heat Warning -->
    <div class="heat-warning glass">
      <strong>Maintenance Warning</strong><br>
   All Services Will Be Offline On Friday For
      V2 Update!<br>
  
    </div>

    <!-- Status -->
    <div class="status-section glass">
      <h2>🌐 Website Current Status</h2>
     <iframe src="https://swlforecast.betteruptime.com" width="1000" height="800"></iframe>
    </div>

    <!-- Warnings -->
    <div class="warnings" id="warnings"></div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" data-section="london">🌆 London Area</button>
      <button class="tab-btn" data-section="somerset">🌳 Somerset</button>
    </div>

    <!-- Places -->
    <div id="places-grid" class="places-grid"></div>

    <!-- Radar -->
    <div class="radar-section">
      <h2>🌧️ Live Rainfall Radar (UK)</h2>
      <iframe src="https://www.rainviewer.com/map.html?loc=51.5,-0.1,8" allowfullscreen></iframe>
    </div>

    <p id="last-updated" class="last-updated">Last updated: just now</p>
  </main>

  <footer style="text-align:center; padding:3rem 0; opacity:0.6;">
    Data from Open-Meteo • Auto-updates every 15 minutes
  </footer>

  <script>
    // (Same logic as before)
    const warningsConfig = [
      { type: "yellow", title: "Yellow Warning", desc: "Yellow Warning Enforced In the UK", visible: true },
      { type: "amber", title: "Amber Warning", desc: "Threat to life and Environment", visible: false },
      { type: "red", title: "Red Warning", desc: "Danger to Life and Environment", visible: false }
    ];

    function renderWarnings() {
      const container = document.getElementById('warnings');
      container.innerHTML = '';
      warningsConfig.filter(w => w.visible).forEach(w => {
        const div = document.createElement('div');
        div.className = `warning glass ${w.type}`;
        div.innerHTML = `<strong>${w.title}</strong> — ${w.desc}`;
        container.appendChild(div);
      });
    }

    const allPlaces = {
      london: [
        { id: "london", name: "London (Central)", lat: 51.5074, lon: -0.1278 },
        { id: "hyde", name: "Hyde Park", lat: 51.5073, lon: -0.1657 },
        { id: "westminster", name: "Westminster", lat: 51.4994, lon: -0.1245 },
        { id: "swindon", name: "Swindon", lat: 51.5558, lon: -1.7798 }
      ],
      somerset: [
        { id: "taunton", name: "Taunton", lat: 51.019, lon: -3.100 },
        { id: "yeovil", name: "Yeovil", lat: 50.9416, lon: -2.6323 },
        { id: "ilminster", name: "Ilminster", lat: 50.927, lon: -2.910 },
        { id: "crewkerne", name: "Crewkerne", lat: 50.883, lon: -2.795 },
        { id: "shepton", name: "Shepton Mallet", lat: 51.192, lon: -2.546 }
      ]
    };

    async function fetchPlaceWeather(place) {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${place.lat}&longitude=${place.lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,wind_speed_10m&timezone=auto`;
      try {
        const res = await fetch(url);
        const data = await res.json();
        return {
          temp: Math.round(data.current.temperature_2m),
          feels: Math.round(data.current.apparent_temperature),
          humidity: data.current.relative_humidity_2m,
          wind: Math.round(data.current.wind_speed_10m)
        };
      } catch(e) { return null; }
    }

    async function renderSection(section) {
      const grid = document.getElementById('places-grid');
      grid.innerHTML = '';
      for (const place of allPlaces[section]) {
        const weather = await fetchPlaceWeather(place);
        const card = document.createElement('div');
        card.className = 'weather-card glass';
        card.innerHTML = `
          <div>
            <div class="temp">${weather ? weather.temp : '--'}°C</div>
            <div class="location">${place.name}</div>
          </div>
          <div class="details" style="text-align:right; line-height:1.7;">
            ${weather ? `Feels like: ${weather.feels}°C<br>Humidity: ${weather.humidity}%<br>Wind: ${weather.wind} km/h` : 'Loading...'}
          </div>
        `;
        grid.appendChild(card);
      }
      document.getElementById('last-updated').textContent = `Last updated: ${new Date().toLocaleTimeString()}`;
    }

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderSection(btn.dataset.section);
      });
    });

    renderWarnings();
    renderSection('london');

    setInterval(() => {
      const active = document.querySelector('.tab-btn.active').dataset.section;
      renderSection(active);
    }, 15 * 60 * 1000);
  </script>
</body>
</html>
