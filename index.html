<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SWLondon Forecast | Somerset & London Weather</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e2937);
      color: #e2e8f0;
      min-height: 100vh;
      line-height: 1.6;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
    header { text-align: center; padding: 3rem 0 2rem; background: rgba(15, 23, 42, 0.95); border-bottom: 1px solid #334155; }
    h1 { font-size: 3.2rem; background: linear-gradient(to right, #60a5fa, #a5b4fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    /* Warning Banners */
    .warnings { margin: 1rem 0; display: flex; flex-direction: column; gap: 8px; }
    .warning {
      padding: 14px 20px;
      border-radius: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .yellow { background: #facc15; color: #1e2937; }
    .amber { background: #f59e0b; color: #1e2937; }
    .red { background: #ef4444; color: white; }

    .tabs { display: flex; justify-content: center; gap: 12px; margin: 1.5rem 0; flex-wrap: wrap; }
    .tab-btn {
      padding: 14px 32px;
      border: none;
      background: #334155;
      color: white;
      border-radius: 50px;
      cursor: pointer;
      font-weight: 600;
    }
    .tab-btn.active { background: #3b82f6; box-shadow: 0 10px 20px rgba(59, 130, 246, 0.4); }

    .current-card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 2.5rem;
      margin: 2rem 0;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 2rem;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .temperature { font-size: 6rem; font-weight: 700; line-height: 1; }

    footer { text-align: center; padding: 3rem 0; opacity: 0.7; font-size: 0.95rem; }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <h1>SWLondon Forecast</h1>
      <p>Live Weather • Somerset & London</p>
    </div>
  </header>

  <main class="container">
    <!-- === WARNINGS SECTION === -->
    <div class="warnings" id="warnings">
      <!-- Warnings will appear here automatically -->
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-location="london">🌆 London</button>
      <button class="tab-btn" data-location="somerset">🌳 Somerset (Taunton)</button>
    </div>

    <div id="current-weather" class="current-card">
      <div>
        <div id="temp" class="temperature">--°C</div>
        <div id="condition" style="font-size:1.4rem; margin-top:0.5rem;">--</div>
        <div id="location-name" style="margin-top:1rem; font-size:1.2rem;">London, UK</div>
      </div>
      <div class="details">
        <p>Feels like: <span id="feels-like">--</span>°C</p>
        <p>Humidity: <span id="humidity">--</span>%</p>
        <p>Wind: <span id="wind">--</span> km/h</p>
      </div>
    </div>

    <p class="last-updated" id="last-updated" style="text-align:center; margin:10px 0;">Last updated: just now</p>

    <!-- More sections can be added later -->
  </main>

  <footer>
    <p>Data from Open-Meteo • Auto-updates every 15 minutes</p>
  </footer>

  <script>
    // ====================== WARNINGS CONFIG ======================
    const warningsConfig = [
      {
        type: "yellow",
        title: "Yellow Warning",
        desc: "Yellow Warning Enforced In the UK & Scotland",
        visible: true
      },
      {
        type: "amber",
        title: "Amber Warning",
        desc: "Threat to life and Environment",
        visible: false
      },
      {
        type: "red",
        title: "Red Warning",
        desc: "Danger to Life and Environment",
        visible: false
      }
    ];

    // Render warnings
    function renderWarnings() {
      const container = document.getElementById('warnings');
      container.innerHTML = '';

      const activeWarnings = warningsConfig.filter(w => w.visible);

      activeWarnings.forEach(w => {
        const div = document.createElement('div');
        div.className = `warning ${w.type}`;
        div.innerHTML = `
          <strong>${w.title}</strong>
          <span>${w.desc}</span>
        `;
        container.appendChild(div);
      });
    }

    // ====================== WEATHER ======================
    const locations = {
      london: { lat: 51.5074, lon: -0.1278, name: "London" },
      somerset: { lat: 51.019, lon: -3.100, name: "Taunton, Somerset" }
    };

    async function fetchWeather(locKey) {
      const loc = locations[locKey];
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m&hourly=temperature_2m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=7`;

      try {
        const res = await fetch(url);
        const data = await res.json();

        document.getElementById('temp').textContent = Math.round(data.current.temperature_2m) + "°C";
        document.getElementById('feels-like').textContent = Math.round(data.current.apparent_temperature);
        document.getElementById('humidity').textContent = data.current.relative_humidity_2m;
        document.getElementById('wind').textContent = Math.round(data.current.wind_speed_10m);
        document.getElementById('location-name').textContent = loc.name + ", UK";

        const now = new Date();
        document.getElementById('last-updated').textContent = `Last updated: ${now.toLocaleTimeString()}`;
      } catch (e) {
        console.error("Error fetching weather", e);
      }
    }

    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        fetchWeather(btn.dataset.location);
      });
    });

    // Initial load
    renderWarnings();
    fetchWeather('london');

    // Auto refresh every 15 minutes
    setInterval(() => {
      const activeTab = document.querySelector('.tab-btn.active');
      fetchWeather(activeTab.dataset.location);
    }, 15 * 60 * 1000);
  </script>
</body>
</html>
